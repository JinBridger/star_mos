<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">音频评估管理后台</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('admin.logout') }}">退出</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="bi bi-list-ul"></i> 实验列表</h5>
                    </div>
                    <div class="card-body">
                        {% if experiments %}
                            <div class="list-group">
                                {% for experiment in experiments %}
                                <div class="list-group-item">
                                    <div class="d-flex w-100 justify-content-between align-items-start">
                                        <div>
                                            <h6 class="mb-1">{{ experiment }}</h6>
                                            <p class="mb-1 text-muted small">
                                                指标: {{ experiment_info[experiment].metrics | join(', ') }}
                                            </p>
                                            <small class="text-muted">{{ experiment_info[experiment].completed_users }} 已完成</small>
                                        </div>
                                        <div class="btn-group-vertical btn-group-sm">
                                            <button type="button" class="btn btn-outline-primary btn-sm experiment-item" 
                                                    data-experiment="{{ experiment }}" title="查看详细分析">
                                                <i class="bi bi-graph-up"></i>
                                            </button>
                                            <a href="{{ url_for('admin.system_scores', experiment_name=experiment) }}" 
                                               class="btn btn-outline-success btn-sm" title="系统分数统计">
                                                <i class="bi bi-trophy"></i>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        {% else %}
                            <p class="text-muted">暂无实验</p>
                        {% endif %}
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                <div id="analysis-content">
                    <div class="card">
                        <div class="card-body text-center text-muted">
                            <h5><i class="bi bi-info-circle"></i> 选择左侧实验查看分析结果</h5>
                            <p class="mb-0">
                                <i class="bi bi-graph-up"></i> 点击图表图标查看详细分析<br>
                                <i class="bi bi-trophy"></i> 点击奖杯图标查看系统分数统计
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
